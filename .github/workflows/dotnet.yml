name: .NET CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x # Using 9.0.x as it's the latest stable, or 10.0.x-preview if needed. 
                              # Note: net10.0 might require a specific preview version.

    - name: Restore dependencies
      run: dotnet restore ModuleNotificationDispatcher.slnx

    - name: Build
      run: dotnet build ModuleNotificationDispatcher.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test ModuleNotificationDispatcher.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: ./ModuleNotificationDispatcher.Tests/TestResults
        fail_ci_if_error: false
