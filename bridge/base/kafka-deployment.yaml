apiVersion: apps/v1
kind: Deployment
metadata:
    name: kafka
    namespace: modulenotificationdispatcher
    labels:
        com.docker.compose.project: modulenotificationdispatcher
        com.docker.compose.service: kafka
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: modulenotificationdispatcher
            com.docker.compose.service: kafka
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: modulenotificationdispatcher
                com.docker.compose.service: kafka
                com.docker.compose.network.default: "true"
        spec:
            containers:
                - name: kafka
                  image: confluentinc/cp-kafka:7.6.0
